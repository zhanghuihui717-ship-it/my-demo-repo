<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8em;
    }

    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 25px;
    }

    .upload-area:hover {
      border-color: #667eea;
      background: #f8f5ff;
    }

    .upload-area.dragover {
      border-color: #667eea;
      background: #f0edff;
    }

    .upload-area p {
      color: #666;
      margin-bottom: 10px;
    }

    .upload-area .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    #file-input {
      display: none;
    }

    #preview-container {
      display: none;
      margin-bottom: 25px;
    }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .preview-box {
      text-align: center;
    }

    .preview-box h3 {
      color: #555;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 10px;
      border: 2px solid #eee;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      color: #666;
    }

    .error {
      color: #e74c3c;
    }

    .success {
      color: #27ae60;
    }

    .checkerboard {
      background-image: 
        linear-gradient(45deg, #ccc 25%, transparent 25%), 
        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #ccc 75%), 
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    .info {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Image Background Remover</h1>

    <div class="upload-area" id="upload-area">
      <div class="icon">📁</div>
      <p>Click or drag image here to upload</p>
      <p style="font-size: 12px; color: #999;">Supports JPG, PNG, WebP</p>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="preview-container">
      <div class="preview-row">
        <div class="preview-box">
          <h3>Original</h3>
          <img id="original-preview" alt="Original">
        </div>
        <div class="preview-box">
          <h3>Result</h3>
          <img id="result-preview" class="checkerboard" alt="Result" style="display: none;">
        </div>
      </div>
    </div>

    <button id="process-btn" disabled>Remove Background</button>
    <p class="status" id="status"></p>
    <p class="info">Powered by Cloudflare Workers + Remove.bg</p>
  </div>

  <script>
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const originalPreview = document.getElementById('original-preview');
    const resultPreview = document.getElementById('result-preview');
    const previewContainer = document.getElementById('preview-container');
    const processBtn = document.getElementById('process-btn');
    const status = document.getElementById('status');

    let currentFile = null;

    // Upload area click
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // File input change
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('Please select an image file', 'error');
        return;
      }

      currentFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        previewContainer.style.display = 'block';
        resultPreview.style.display = 'none';
        processBtn.disabled = false;
        processBtn.textContent = 'Remove Background';
        processBtn.onclick = null;
        status.textContent = '';
      };
      reader.readAsDataURL(file);
    }

    // Process button
    processBtn.addEventListener('click', async () => {
      if (!currentFile) {
        showStatus('Please upload an image first', 'error');
        return;
      }

      processBtn.disabled = true;
      showStatus('Processing... please wait', '');

      try {
        // Convert file to base64
        const base64 = await fileToBase64(currentFile);
        const imageData = base64.split(',')[1];

        // Call our Worker API
        // Replace this URL with your actual Worker URL after deployment
        const workerUrl = 'https://bg-remover.your-subdomain.workers.dev/';

        const response = await fetch(workerUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            image_data: imageData,
            size: 'auto',
            format: 'png',
          }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'API request failed');
        }

        const data = await response.json();

        // Convert base64 result to image
        const resultUrl = 'data:image/png;base64,' + data.result;
        resultPreview.src = resultUrl;
        resultPreview.style.display = 'block';

        // Enable download
        processBtn.textContent = 'Download Result';
        processBtn.disabled = false;
        processBtn.onclick = () => downloadImage(resultUrl);

        showStatus('Success! Click to download', 'success');

      } catch (error) {
        showStatus(error.message || 'Something went wrong', 'error');
        processBtn.disabled = false;
        processBtn.textContent = 'Remove Background';
        processBtn.onclick = null;
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function downloadImage(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'no-background.png';
      a.click();
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
